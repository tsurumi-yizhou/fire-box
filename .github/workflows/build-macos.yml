name: Build macOS

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

env:
  CARGO_TERM_COLOR: always

jobs:
  core:
    runs-on: macos-latest
    steps:
    - uses: actions/checkout@v6
    - uses: dtolnay/rust-toolchain@stable
      with:
        components: clippy
    - uses: actions/cache@v5
      with:
        path: |
          ~/.cargo/registry
          ~/.cargo/git
          core/target/
        key: ${{ runner.os }}-cargo-${{ hashFiles('core/Cargo.lock') }}
    - name: Build core
      run: cd core && cargo build --verbose
    - name: Test core
      run: cd core && cargo test --lib --verbose
    - name: Clippy
      run: cd core && cargo clippy -- -D warnings

  macos:
    needs: core
    runs-on: macos-latest
    steps:
    - uses: actions/checkout@v6
    - uses: dtolnay/rust-toolchain@stable
    - uses: actions/cache@v5
      with:
        path: |
          ~/.cargo/registry
          ~/.cargo/git
          core/target/
        key: ${{ runner.os }}-cargo-${{ hashFiles('core/Cargo.lock') }}
    - name: Build Rust core
      run: cd core && cargo build
    - name: Swift build
      run: cd macos && swift build
